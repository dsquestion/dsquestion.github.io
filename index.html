<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智能助手 - DeepSeek</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: #f7f7f8;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .user-message {
            align-self: flex-end;
        }
        .assistant-message {
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user-message .bubble {
            background: #0084ff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant-message .bubble {
            background: #e4e6eb;
            color: #1c1e21;
            border-bottom-left-radius: 4px;
        }
        .chat-input-area {
            padding: 12px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
            background: white;
        }
        textarea {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 24px;
            padding: 10px 16px;
            font-family: inherit;
            font-size: 16px;
            resize: none;
            height: 48px;
            max-height: 120px;
        }
        button {
            background: #0084ff;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); }
        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }
        .loading {
            font-size: 14px;
            color: gray;
            padding: 8px 16px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-messages" id="chatMessages">
        <div class="message assistant-message">
            <div class="bubble">你好！我是 DeepSeek 助手，有什么可以帮你的吗？</div>
        </div>
    </div>
    <div class="chat-input-area">
        <textarea id="userInput" placeholder="输入你的问题..." rows="1"></textarea>
        <button id="sendBtn">发送</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
